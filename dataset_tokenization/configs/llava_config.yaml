# Configuration for LLaVA dataset tokenization
# This file serves as an example for dataset-specific configurations

dataset:
  name: llava
  input_path: /capstor/store/cscs/swissai/infra01/vision-datasets/llava_pretrain/LLaVA-Pretrain
  description: LLaVA Pretrain dataset with 558K images

tokenizer:
  name: emu3
  model_path: BAAI/Emu3-VisionTokenizer
  device: cuda

processing:
  batch_size: 16
  num_shards: 10
  create_shards: true  # Set to false to reuse existing shards

output:
  base_dir: /iopsstor/scratch/cscs/xyixuan/tokenized_datasets
  # Will create: base_dir/llava/shards/, base_dir/llava/tokens/, base_dir/llava/logs/

# Future multi-node configuration (not implemented yet)
distributed:
  enabled: false
  world_size: 1
  backend: nccl
  
# Resource limits
resources:
  max_memory_gb: 32  # Maximum memory usage
  num_workers: 4     # DataLoader workers (future feature)