<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Benchmark Viewer{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="nav-brand">Benchmark Viewer</a>
            <div class="nav-links">
                <a href="/vlm">VLM</a>
                <a href="/captioning">Captioning</a>
                <a href="/completion">Image Completion</a>

        </div>

    <footer>
        <div class="container">
            <p>Qualitative Benchmark Explorer</p>
        </div>
    </footer>
</body>
</html>
