# ──────────────────────────────────────────────────────────────────────────────
# PMC-OA — image2text, WebDataset, single-image + caption
# ──────────────────────────────────────────────────────────────────────────────
defaults:
  - _base_wds

output_name: pmc_oa
output_dir: /capstor/scratch/cscs/xyixuan/vision-datasets-tokenized
manifest_path: /capstor/scratch/cscs/xyixuan/manifests/pmc_oa/manifest.parquet
text_column: txt

# --- Single-image: each sample has img1.png ----------------------------------
multi_image: false
image_field_pattern: img

# --- Overrides ----------------------------------------------------------------
max_batch_tokens: 32768
batch_plan_path: /capstor/scratch/cscs/xyixuan/batch_plans/pmc_oa.pt
