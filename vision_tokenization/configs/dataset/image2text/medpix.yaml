# ──────────────────────────────────────────────────────────────────────────────
# MedPix medical cases — image2text, WebDataset, multi-image
# ──────────────────────────────────────────────────────────────────────────────
defaults:
  - _base_wds

output_name: medpix
manifest_path: /capstor/store/cscs/swissai/infra01/vision-datasets/medical/apertus_image_text_v1/medpix/manifest.parquet
text_column: txt

# --- Multi-image: each sample has img1.png, img2.png, ... --------------------
multi_image: true
image_field_pattern: img

# --- Overrides (smaller dataset → fewer clusters) ----------------------------
num_clusters: 100
gpu_kmeans: false
checkpoint_interval_batches: 100
seqlen_threshold: 8192
output_dir: /capstor/scratch/cscs/xyixuan/vision-datasets-tokenized
batch_plan_path: /capstor/scratch/cscs/xyixuan/batch_plans/medpix.pt
