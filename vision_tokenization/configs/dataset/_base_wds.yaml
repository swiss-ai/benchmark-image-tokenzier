# Base defaults for WebDataset (.tar) datasets.
#
# Inherit in dataset configs:
#   defaults:
#     - _base_wds
#
# Typical overrides:
#   output_name: my_dataset
#   manifest_path: /path/to/manifest.parquet
#   image_column: image
#   text_column: txt  # for image2text / sft

dataset_type: wds

# Required paths
output_dir: ???
manifest_path: ???
image_column: image
multi_image: null                  # set true/false explicitly; null = infer only from image_list_column

# Image filtering
min_pixels: "64*128"
max_pixels: "2048*2048"

# Batch planning
batch_plan_path: null              # null = compute from manifest at startup
max_batch_tokens: 25600            # token budget per batch
batch_size: 32                     # max samples per batch
spatial_factor: 16                 # vision tokenizer spatial down-sampling
num_clusters: 2000                 # k-means clusters for aspect-ratio grouping
niter: 10                          # k-means iterations
gpu_kmeans: true                   # use GPU for k-means
resize_mode: avg                   # per-batch resize target: avg | min | max

# Augmentation
augmentation: null                 # null = disabled

# Checkpointing / runtime
checkpoint_interval_batches: 1000  # finalize chunk + save progress every N batches
max_consecutive_errors: 50         # abort after N consecutive batch failures

prefetch:
  queue_size: 4                    # output queue depth (batches buffered ahead of GPU)
  num_workers: 4                   # I/O threads in the prefetch pool (1 = single-thread)

seqlen_threshold: null             # null = no split; integer = sequences > N tokens -> lct/

# WDS-specific
max_open_files: 64                 # LRU cache size for open tar file handles
